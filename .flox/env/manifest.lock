    "build": {
      "llamacpp-flox-runtime": {
        "command": "  set -euo pipefail\n\n  SCRIPTS_DIR=\"$FLOX_ENV_PROJECT/scripts\"\n\n  # --- git metadata ---\n  if command -v git >/dev/null 2>&1 && git -C \"$FLOX_ENV_PROJECT\" rev-parse --git-dir >/dev/null 2>&1; then\n    rev_count=$(git -C \"$FLOX_ENV_PROJECT\" rev-list --count HEAD 2>/dev/null || echo \"unknown\")\n    short_rev=$(git -C \"$FLOX_ENV_PROJECT\" rev-parse --short HEAD 2>/dev/null || echo \"unknown\")\n    full_rev=$(git -C \"$FLOX_ENV_PROJECT\" rev-parse HEAD 2>/dev/null || echo \"unknown\")\n    if git -C \"$FLOX_ENV_PROJECT\" diff --quiet HEAD 2>/dev/null && git -C \"$FLOX_ENV_PROJECT\" diff --cached --quiet HEAD 2>/dev/null; then\n      dirty=false\n      dirty_suffix=\"\"\n    else\n      dirty=true\n      dirty_suffix=\"-dirty\"\n    fi\n    recent_log=$(git -C \"$FLOX_ENV_PROJECT\" log --oneline -10 2>/dev/null || echo \"  (unavailable)\")\n  else\n    rev_count=\"unknown\"\n    short_rev=\"unknown\"\n    full_rev=\"unknown\"\n    dirty=\"unknown\"\n    dirty_suffix=\"\"\n    recent_log=\"  (no git repository)\"\n  fi\n\n  version=\"0.1.0+${rev_count}.${short_rev}${dirty_suffix}\"\n\n  # --- install scripts ---\n  mkdir -p \"$out/bin\"\n  for script in llamacpp-preflight llamacpp-resolve-model llamacpp-serve; do\n    install -m 0755 \"$SCRIPTS_DIR/$script\" \"$out/bin/$script\"\n  done\n\n  # --- compute script metadata ---\n  script_info=\"\"\n  for script in llamacpp-preflight llamacpp-resolve-model llamacpp-serve; do\n    f=\"$out/bin/$script\"\n    sha=$(sha256sum \"$f\" | cut -d' ' -f1)\n    bytes=$(wc -c < \"$f\")\n    lines=$(wc -l < \"$f\")\n    script_info=\"${script_info}$(printf '  %-24s sha256:%s  %s bytes  %s lines' \"$script\" \"$sha\" \"$bytes\" \"$lines\")\n\"\n  done\n\n  # --- write BUILD_INFO ---\n  mkdir -p \"$out/share/llamacpp-flox-runtime\"\n  cat > \"$out/share/llamacpp-flox-runtime/BUILD_INFO\" <<EOF\nllamacpp-flox-runtime ${version}\nbuilt: $(date -u +%Y-%m-%dT%H:%M:%SZ)\n\ngit:\n  rev:       ${full_rev}\n  short_rev: ${short_rev}\n  rev_count: ${rev_count}\n  dirty:     ${dirty}\n\nscripts:\n$(printf '%b' \"$script_info\")\n\nrecent changes:\n$(echo \"$recent_log\" | sed 's/^/  /')\nEOF\n\n  # --- build version marker (pre-computed in build-meta/*.json) ---\n  build_meta=\"$FLOX_ENV_PROJECT/build-meta/llamacpp-flox-runtime.json\"\n  if [[ -f \"$build_meta\" ]]; then\n    build_ver=$(jq -r '.build_version' \"$build_meta\")\n    force_inc=$(jq -r '.force_increment' \"$build_meta\")\n    meta_rev=$(jq -r '.git_rev' \"$build_meta\")\n    meta_rev_short=$(jq -r '.git_rev_short' \"$build_meta\")\n    changelog=$(jq -r '.changelog' \"$build_meta\")\n  else\n    build_ver=\"0\"\n    force_inc=\"0\"\n    meta_rev=\"unknown\"\n    meta_rev_short=\"unknown\"\n    changelog=\"(no build-meta found)\"\n  fi\n\n  cat > \"$out/share/llamacpp-flox-runtime/flox-build-version-${build_ver}\" <<MARKER\nbuild-version: ${build_ver}\ngit-rev: ${meta_rev}\ngit-rev-short: ${meta_rev_short}\nforce-increment: ${force_inc}\nchangelog: ${changelog}\nMARKER\n",
        "sandbox": "off",
        "version": "0.9.2",
        "description": "Runtime scripts for llama.cpp model serving with Flox"
      }
    }
  },
