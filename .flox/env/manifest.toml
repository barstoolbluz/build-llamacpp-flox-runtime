## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
version = 1


## Install Packages --------------------------------------------------
[install]
git.pkg-path = "git"


## Environment Variables ---------------------------------------------
[vars]


## Activation Hook ---------------------------------------------------
[hook]


## Profile script ----------------------------------------------------
[profile]


## Services ---------------------------------------------------------
[services]


## Build and publish your own packages ------------------------------
[build.llamacpp-flox-runtime]
sandbox = "off"
version.command = "printf '0.9.1+%s.%s' \"$(git rev-list --count HEAD 2>/dev/null || echo 0)\" \"$(git rev-parse --short HEAD 2>/dev/null || echo unknown)\""
description = "Runtime scripts for llama.cpp model serving with Flox"
command = """
  set -euo pipefail

  SCRIPTS_DIR="$FLOX_ENV_PROJECT/scripts"

  # --- git metadata ---
  if command -v git >/dev/null 2>&1 && git -C "$FLOX_ENV_PROJECT" rev-parse --git-dir >/dev/null 2>&1; then
    rev_count=$(git -C "$FLOX_ENV_PROJECT" rev-list --count HEAD 2>/dev/null || echo "unknown")
    short_rev=$(git -C "$FLOX_ENV_PROJECT" rev-parse --short HEAD 2>/dev/null || echo "unknown")
    full_rev=$(git -C "$FLOX_ENV_PROJECT" rev-parse HEAD 2>/dev/null || echo "unknown")
    if git -C "$FLOX_ENV_PROJECT" diff --quiet HEAD 2>/dev/null && \
       git -C "$FLOX_ENV_PROJECT" diff --cached --quiet HEAD 2>/dev/null; then
      dirty=false
      dirty_suffix=""
    else
      dirty=true
      dirty_suffix="-dirty"
    fi
    recent_log=$(git -C "$FLOX_ENV_PROJECT" log --oneline -10 2>/dev/null || echo "  (unavailable)")
  else
    rev_count="unknown"
    short_rev="unknown"
    full_rev="unknown"
    dirty="unknown"
    dirty_suffix=""
    recent_log="  (no git repository)"
  fi

  version="0.1.0+${rev_count}.${short_rev}${dirty_suffix}"

  # --- install scripts ---
  mkdir -p "$out/bin"
  for script in llamacpp-preflight llamacpp-resolve-model llamacpp-serve; do
    install -m 0755 "$SCRIPTS_DIR/$script" "$out/bin/$script"
  done

  # --- compute script metadata ---
  script_info=""
  for script in llamacpp-preflight llamacpp-resolve-model llamacpp-serve; do
    f="$out/bin/$script"
    sha=$(sha256sum "$f" | cut -d' ' -f1)
    bytes=$(wc -c < "$f")
    lines=$(wc -l < "$f")
    script_info="${script_info}$(printf '  %-24s sha256:%s  %s bytes  %s lines' "$script" "$sha" "$bytes" "$lines")\n"
  done

  # --- write BUILD_INFO ---
  mkdir -p "$out/share/llamacpp-flox-runtime"
  cat > "$out/share/llamacpp-flox-runtime/BUILD_INFO" <<EOF
llamacpp-flox-runtime ${version}
built: $(date -u +%Y-%m-%dT%H:%M:%SZ)

git:
  rev:       ${full_rev}
  short_rev: ${short_rev}
  rev_count: ${rev_count}
  dirty:     ${dirty}

scripts:
$(printf '%b' "$script_info")

recent changes:
$(echo "$recent_log" | sed 's/^/  /')
EOF

  # --- build version marker ---
  build_version_file="$FLOX_ENV_PROJECT/build-version"
  build_ver="0"
  build_baseline=""
  if [[ -f "$build_version_file" ]]; then
    while IFS='=' read -r key val; do
      key="${key%%#*}"; key="${key// /}"
      val="${val%%#*}"; val="${val// /}"
      case "$key" in
        BUILD_VERSION)  build_ver="$val" ;;
        BUILD_BASELINE) build_baseline="$val" ;;
      esac
    done < "$build_version_file"
  fi

  precis=""
  if [[ -n "$build_baseline" ]] && \
     git -C "$FLOX_ENV_PROJECT" cat-file -e "${build_baseline}^{commit}" 2>/dev/null; then
    precis=$(git -C "$FLOX_ENV_PROJECT" log --oneline "${build_baseline}..HEAD" 2>/dev/null || true)
  fi
  if [[ -z "$precis" ]]; then
    precis=$(git -C "$FLOX_ENV_PROJECT" log --oneline 2>/dev/null || echo "(unavailable)")
  fi

  cat > "$out/share/llamacpp-flox-runtime/flox-build-version-${build_ver}" <<MARKER
llamacpp-flox-runtime build ${build_ver}
built: $(date -u +%Y-%m-%dT%H:%M:%SZ)
commit: ${full_rev}${dirty_suffix}

changes since build $((build_ver - 1)):
$(echo "$precis" | sed 's/^/  /')
MARKER
"""


## Other Environment Options -----------------------------------------
[options]
